<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Colors — Semantic" subtitle="Status / utility (success, warn, danger, info)" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-0); }
  body { padding: 20px; box-sizing: border-box; min-height: 200px; }
  
</style>
</head>
<body>

  <div style="display:flex; flex-direction:column; gap:10px;">
    <div class="mg-eyebrow" style="color:var(--ink-400);">SEMANTIC — status / utility</div>
    <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap:8px;">
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#E8F6EE; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#E8F6EE</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">success-50</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#1F8A4C; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#1F8A4C</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">success-500</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#FFF3DC; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#FFF3DC</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">warn-50</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#E89B14; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#E89B14</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">warn-500</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#FCE7E4; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#FCE7E4</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">danger-50</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#D03826; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#D03826</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">danger-500</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#E4ECF7; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#E4ECF7</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">info-50</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#2563C8; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#2563C8</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">info-500</div>
        </div>
      
    </div>
  </div>

</body>
</html>
