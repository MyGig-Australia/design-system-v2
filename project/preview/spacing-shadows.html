<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation + stamp shadow" subtitle="sh-1 to sh-4 + brand stamp motif" viewport="700x240" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-0); }
  body { padding: 20px; box-sizing: border-box; min-height: 240px; }
  
</style>
</head>
<body>

  <div style="display:flex; flex-direction:column; gap:14px;">
    <div class="mg-eyebrow" style="color:var(--ink-400);">Elevation + the stamp motif</div>
    <div style="display:flex; gap:20px; flex-wrap:wrap; padding:8px 4px;">
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div style="width:80px; height:64px; background:white; box-shadow:var(--sh-1); border-radius:var(--r-sm); border:1px solid var(--ink-100);"></div>
          <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">sh-1</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div style="width:80px; height:64px; background:white; box-shadow:var(--sh-2); border-radius:var(--r-sm); border:1px solid var(--ink-100);"></div>
          <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">sh-2</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div style="width:80px; height:64px; background:white; box-shadow:var(--sh-3); border-radius:var(--r-sm); border:1px solid var(--ink-100);"></div>
          <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">sh-3</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div style="width:80px; height:64px; background:white; box-shadow:var(--sh-4); border-radius:var(--r-sm); border:1px solid var(--ink-100);"></div>
          <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">sh-4</span>
        </div>
      
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px; margin-left:24px;">
        <div style="width:80px; height:64px; background:var(--brand-500); box-shadow:var(--sh-stamp); border:3px solid var(--ink-900); border-radius:var(--r-sm);"></div>
        <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">stamp</span>
      </div>
    </div>
    <div class="mg-body-sm" style="color:var(--ink-400);">The hard offset stamp shadow is a brand moment — primary CTAs, hero badges. Not everywhere.</div>
  </div>

</body>
</html>
