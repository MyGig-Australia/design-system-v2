<!DOCTYPE html>
<!-- @dsCard group="Components" name="Components — Stamp badge" subtitle="Hero-only brand moment" viewport="700x240" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-0); }
  body { padding: 20px; box-sizing: border-box; min-height: 240px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  
</style>
</head>
<body>

  <div style="display:flex; flex-direction:column; gap:14px;">
    <div class="mg-eyebrow" style="color:var(--ink-400);">Stamp motif — hero badge</div>
    <div style="display:flex; gap:24px; align-items:center;">
      <div style="display:inline-flex; align-items:center; gap:10px; padding:12px 18px; background:var(--brand-500); border:3px solid var(--ink-900); border-radius:var(--r-md); box-shadow:var(--sh-stamp); transform:rotate(-2deg);">
        <span class="mg-display" style="font-size:18px; color:var(--ink-900); line-height:1;">90%+ fill rate</span>
      </div>
      <div style="display:inline-flex; flex-direction:column; align-items:center; gap:2px; padding:14px 22px; background:var(--ink-900); border:3px solid var(--ink-900); border-radius:var(--r-md); box-shadow:4px 4px 0 var(--brand-500); transform:rotate(2deg);">
        <span class="mg-display" style="font-size:24px; color:var(--brand-300); line-height:1;">EOR</span>
        <span class="mg-caption" style="color:white; letter-spacing:var(--tr-eyebrow); text-transform:uppercase; font-size:9px;">NSW · WA · TAS · NT</span>
      </div>
    </div>
    <div class="mg-body-sm" style="color:var(--ink-400);">A deliberate brand moment — feels like a job-site sign / parking permit. Use as a hero accent, not chrome.</div>
  </div>

</body>
</html>
