<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing — 4pt grid" subtitle="sp-1 through sp-24" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-0); }
  body { padding: 20px; box-sizing: border-box; min-height: 200px; }
  
</style>
</head>
<body>

  <div style="display:flex; flex-direction:column; gap:14px;">
    <div class="mg-eyebrow" style="color:var(--ink-400);">Spacing — 4pt grid</div>
    <div style="display:flex; align-items:flex-end; gap:10px;">
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:4px; height:4px; background:var(--ink-900);"></div>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">4</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:8px; height:8px; background:var(--ink-900);"></div>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">8</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:12px; height:12px; background:var(--ink-900);"></div>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">12</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:16px; height:16px; background:var(--ink-900);"></div>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">16</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:20px; height:20px; background:var(--ink-900);"></div>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">20</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:24px; height:24px; background:var(--ink-900);"></div>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">24</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:32px; height:32px; background:var(--ink-900);"></div>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">32</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:40px; height:40px; background:var(--ink-900);"></div>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">40</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:48px; height:48px; background:var(--ink-900);"></div>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">48</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <div style="width:64px; height:64px; background:var(--ink-900);"></div>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">64</span>
        </div>
      
    </div>
    <div class="mg-body-sm" style="color:var(--ink-400);">Tokens <code class="mg-mono" style="font-size:13px;">--sp-1</code> through <code class="mg-mono" style="font-size:13px;">--sp-24</code>. Card padding defaults to 24px.</div>
  </div>

</body>
</html>
