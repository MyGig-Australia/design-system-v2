<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="xs/sm/md/lg/xl/pill" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-0); }
  body { padding: 20px; box-sizing: border-box; min-height: 220px; }
  
</style>
</head>
<body>

  <div style="display:flex; flex-direction:column; gap:14px;">
    <div class="mg-eyebrow" style="color:var(--ink-400);">Radii</div>
    <div style="display:flex; gap:14px; flex-wrap:wrap;">
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div style="width:72px; height:72px; background:var(--ink-900); border-radius:4px;"></div>
          <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">xs</span>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">4px</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div style="width:72px; height:72px; background:var(--ink-900); border-radius:8px;"></div>
          <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">sm</span>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">8px</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div style="width:72px; height:72px; background:var(--ink-900); border-radius:12px;"></div>
          <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">md</span>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">12px</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div style="width:72px; height:72px; background:var(--ink-900); border-radius:18px;"></div>
          <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">lg</span>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">18px</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div style="width:72px; height:72px; background:var(--ink-900); border-radius:28px;"></div>
          <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">xl</span>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">28px</span>
        </div>
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div style="width:72px; height:72px; background:var(--ink-900); border-radius:999px;"></div>
          <span class="mg-caption" style="color:var(--ink-700); font-weight:600;">pill</span>
          <span class="mg-mono" style="font-size:10px; color:var(--ink-400);">999</span>
        </div>
      
    </div>
  </div>

</body>
</html>
