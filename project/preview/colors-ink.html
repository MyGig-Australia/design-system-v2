<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Colors — Ink scale" subtitle="Neutral / brand black — 8 steps" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-0); }
  body { padding: 20px; box-sizing: border-box; min-height: 200px; }
  
</style>
</head>
<body>

  <div style="display:flex; flex-direction:column; gap:10px;">
    <div class="mg-eyebrow" style="color:var(--ink-400);">INK — neutral / brand black</div>
    <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap:8px;">
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#FAF8F4; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#FAF8F4</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">ink-0</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#F2EFE8; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#F2EFE8</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">ink-50</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#E5E1D7; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#E5E1D7</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">ink-100</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#A8A294; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#A8A294</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">ink-300</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#6F6A60; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#6F6A60</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">ink-400</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#3D3A33; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#3D3A33</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">ink-500</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#1F1D19; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#1F1D19</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">ink-700</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#0E0D0B; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#0E0D0B</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">ink-900</div>
        </div>
      
    </div>
  </div>

</body>
</html>
