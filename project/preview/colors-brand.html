<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Colors — Brand scale" subtitle="Signature MyGig violet — from mygig.com.au" viewport="700x260" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-0); }
  body { padding: 20px; box-sizing: border-box; min-height: 260px; }
  
</style>
</head>
<body>

  
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div class="mg-eyebrow" style="color:var(--ink-400);">BRAND — signature MyGig violet</div>
    <div style="display:grid; grid-template-columns: repeat(7, 1fr); gap:8px;">
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#F5F4FE; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#F5F4FE</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">brand-50</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#E8E6F9; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#E8E6F9</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">brand-100</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#DBD8FA; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#DBD8FA</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">brand-200</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#B8B1F7; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:var(--ink-700);">
            <span class="mg-mono" style="font-size:11px;">#B8B1F7</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">brand-300</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#6C60FF; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#6C60FF</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">brand-500</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#4B3FD9; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#4B3FD9</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">brand-700</div>
        </div>
      
        <div style="display:flex; flex-direction:column; gap:6px;">
          <div style="height:80px; background:#2D2580; border-radius:var(--r-sm); border:1px solid rgba(14,13,11,0.06); display:flex; align-items:flex-end; padding:8px; color:white;">
            <span class="mg-mono" style="font-size:11px;">#2D2580</span>
          </div>
          <div class="mg-caption" style="color:var(--ink-700); font-weight:600;">brand-900</div>
        </div>
      
    </div>
  </div>

  <div class="mg-body-sm" style="color:var(--ink-400); margin-top:12px; padding:0 4px;">
    The MyGig brand colour. Pulled from mygig.com.au. Confident, not sparing — it IS the brand. White text reads on the 500.
  </div>

</html>
